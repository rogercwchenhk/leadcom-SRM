# 系统设置配置文件
# 用途：存储系统所有配置信息（公司信息、AI配置、通知设置、审批规则等）
# 说明：此文件由系统自动管理

company:
  name: 示例科技有限公司
  logo: ''
  website: https://example.com
  phone: 400-123-4567
  email: contact@example.com
  address: 北京市朝阳区xxx街道xxx号
  description: 一家专注于供应链管理的科技公司
  taxId: 91110000MA001XXXX
  businessLicense: ''
ai:
  enabled: true
  apiEndpoint: https://api.hermes-agent.example.com/v1
  apiKey: ''
  model: gpt-4
  temperature: 0.7
  maxTokens: 2048
  systemPrompt: 你是一个专业的采购助手，帮助用户管理采购需求、分析供应商报价、提供决策建议。
  autoInquiry: true
  autoDecision: false
notification:
  email:
    enabled: true
    address: admin@example.com
    contractUpload: true
    approvalRequired: true
    approvalCompleted: true
    poCreated: true
    supplierResponse: true
    systemAlert: true
  inApp:
    enabled: true
    contractUpload: true
    approvalRequired: true
    approvalCompleted: true
    poCreated: true
    supplierResponse: true
    systemAlert: true
  push:
    enabled: false
    contractUpload: false
    approvalRequired: true
    approvalCompleted: true
    poCreated: false
    supplierResponse: true
    systemAlert: true
approval:
  rules:
    - id: 1
      name: 小额采购
      minAmount: 0
      maxAmount: 10000
      currency: CNY
      enabled: true
      description: 1万元以下的采购订单
      stages:
        - id: s1
          name: 采购负责人审批
          type: any
          approvers:
            - id: u1
              type: user
              name: 钟丽莉
              role: 采购负责人
    - id: 2
      name: 中额采购
      minAmount: 10000
      maxAmount: 50000
      currency: CNY
      enabled: true
      description: 1万-5万元的采购订单
      stages:
        - id: s1
          name: 采购负责人审批
          type: any
          approvers:
            - id: u1
              type: user
              name: 钟丽莉
              role: 采购负责人
        - id: s2
          name: 财务审批
          type: any
          approvers:
            - id: u3
              type: user
              name: 张财务
              role: 财务
    - id: 3
      name: 大额采购
      minAmount: 50000
      maxAmount: 100000
      currency: CNY
      enabled: true
      description: 5万-10万元的采购订单
      stages:
        - id: s1
          name: 采购负责人审批
          type: any
          approvers:
            - id: u1
              type: user
              name: 钟丽莉
              role: 采购负责人
        - id: s2
          name: 财务和管理层审批
          type: all
          approvers:
            - id: u3
              type: user
              name: 张财务
              role: 财务
            - id: u4
              type: user
              name: 王总
              role: 审批人员
    - id: 4
      name: 特大额采购
      minAmount: 100000
      maxAmount: null
      currency: CNY
      enabled: true
      description: 10万元以上的采购订单
      stages:
